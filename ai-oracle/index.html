<script src="../js/main.js"></script>
<script>
  const history = [];
  const SYSTEM = `You are the Love Oracle — a warm, mystical, and empathetic AI guide for teenagers. 
You speak in a romantic, poetic, and uplifting tone. You give thoughtful advice about love, crushes, friendships, heartbreak, and self-love.
Always be kind, supportive, and age-appropriate. Never give harmful advice. 
Use occasional emojis and cosmic metaphors. Keep responses to 3-5 sentences — warm and focused.
If someone seems very sad or mentions serious issues, gently suggest talking to a trusted adult or friend.`;

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';
    input.disabled = true;

    const typingDiv = addMessage('✨ The oracle is thinking...', 'ai');

    // Build a single text prompt with context (just like horoscope does)
    let fullPrompt = SYSTEM + '\n\n';
    
    if (history.length > 0) {
      fullPrompt += 'Previous conversation:\n';
      // Use last 6 messages for context
      const recent = history.slice(-6);
      for (const h of recent) {
        const role = h.role === 'user' ? 'User' : 'Oracle';
        fullPrompt += `${role}: ${h.parts[0].text}\n`;
      }
    }
    fullPrompt += `\nUser: ${msg}\nOracle:`;

    try {
      // ✅ USE THE PROXY (no API key exposed, handles CORS)
      const reply = await askGemini(fullPrompt, { json: false });
      
      // Store in history for context next time
      history.push({ role: 'user', parts: [{ text: msg }] });
      history.push({ role: 'model', parts: [{ text: reply }] });
      
      typingDiv.textContent = reply;
    } catch (err) {
      console.error('Love Oracle chat error:', err);
      typingDiv.textContent = '🌩️ ' + (err.message || 'Something went wrong. Please try again.');
      typingDiv.style.color = '#ffd9e3';
    }

    input.disabled = false;
    input.focus();
    scrollToBottom();
  }

  function addMessage(text, role) {
    const box = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    box.appendChild(div);
    scrollToBottom();
    return div;
  }

  function scrollToBottom() {
    const box = document.getElementById('chatMessages');
    box.scrollTop = box.scrollHeight;
  }
</script>
