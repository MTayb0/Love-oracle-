<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birth Chart — Love Oracle</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div class="page">
    <nav>
      <a href="../index.html" class="nav-logo">Love <span>Oracle</span></a>
      <a href="../index.html" class="nav-back">← Back</a>
    </nav>

    <div class="tool-page">
      <div class="tool-header">
        <span class="icon">🌙</span>
        <h1>Birth Chart</h1>
        <p>Discover your sun, moon & rising signs</p>
      </div>

      <div class="card">
        <div class="input-group">
          <label>Your Name</label>
          <input type="text" id="bName" placeholder="Enter your name..."/>
        </div>
        <div class="input-group">
          <label>Date of Birth</label>
          <input type="date" id="bDate"/>
        </div>
        <div class="input-group">
          <label>Time of Birth (approximate is fine)</label>
          <input type="time" id="bTime"/>
        </div>
        <div class="input-group">
          <label>City of Birth</label>
          <input type="text" id="bCity" placeholder="e.g. Dubai, Abu Dhabi, Cairo..."/>
        </div>
        <button class="btn" id="chartBtn" onclick="getChart()">🌙 Reveal My Birth Chart</button>
      </div>

      <div id="loadingDiv" class="loading" style="display:none; justify-content:center;">
        <div class="spinner"></div>
        <span>Mapping the cosmos at your birth...</span>
      </div>

      <div id="errorBox" style="display:none; margin-top:1rem;"></div>

      <div class="result-box" id="result">
        <div class="result-title">Your Cosmic Blueprint</div>
        <div id="signsRow" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.8rem; margin-bottom:1.5rem;"></div>
        <div class="result-text" id="resultText"></div>
      </div>
    </div>

    <footer><p>Made with 💕 by Love Oracle · For entertainment purposes</p></footer>
  </div>

  <script src="../js/main.js"></script>
  <script>
    async function getChart() {
      const name = document.getElementById('bName').value.trim();
      const date = document.getElementById('bDate').value;
      const time = document.getElementById('bTime').value;
      const city = document.getElementById('bCity').value.trim();
      if (!name || !date) { alert('Please enter your name and date of birth 🌙'); return; }

      const btn = document.getElementById('chartBtn');
      const resultBox = document.getElementById('result');
      const errorBox = document.getElementById('errorBox');
      btn.disabled = true;
      resultBox.classList.remove('show');
      errorBox.style.display = 'none';
      document.getElementById('loadingDiv').style.display = 'flex';

      const prompt = `You are a mystical astrologer. Based on these birth details:
Name: ${name}
Date: ${date}
Time: ${time || 'unknown'}
City: ${city || 'unknown'}

Respond with ONLY valid JSON, no markdown fences, no extra text, in exactly this shape:
{
  "sun": "sun sign name",
  "moon": "moon sign name",
  "rising": "rising/ascendant sign (best guess if time unknown)",
  "reading": "4-5 warm, poetic sentences about ${name}'s personality, love style, and cosmic gifts, using their name"
}`;

      try {
        const raw = await askGemini(prompt, { json: true });
        const data = safeParseJSON(raw);
        if (!data || !data.reading) {
          throw new Error('The oracle\'s response could not be understood. Please try again.');
        }

        document.getElementById('signsRow').innerHTML = `
          <div style="background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:1.2rem;text-align:center;">
            <div style="font-size:1.8rem">☀️</div>
            <div style="font-size:0.7rem;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin:0.4rem 0">Sun Sign</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--blush)">${data.sun || '—'}</div>
          </div>
          <div style="background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:1.2rem;text-align:center;">
            <div style="font-size:1.8rem">🌙</div>
            <div style="font-size:0.7rem;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin:0.4rem 0">Moon Sign</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--blush)">${data.moon || '—'}</div>
          </div>
          <div style="background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:1.2rem;text-align:center;">
            <div style="font-size:1.8rem">⬆️</div>
            <div style="font-size:0.7rem;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin:0.4rem 0">Rising Sign</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--blush)">${data.rising || '—'}</div>
          </div>`;

        document.getElementById('resultText').textContent = data.reading;
        document.getElementById('loadingDiv').style.display = 'none';
        resultBox.classList.add('show');
      } catch (err) {
        document.getElementById('loadingDiv').style.display = 'none';
        showOracleError(err, errorBox);
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
